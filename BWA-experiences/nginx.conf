server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Charset
    charset utf-8;

    # ── MIME types vidéo ──
    # .mov n'est pas toujours reconnu par nginx de base
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js;
        application/json                      json;
        application/manifest+json             webmanifest json;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/svg+xml                         svg;
        image/x-icon                          ico;
        video/mp4                             mp4;
        video/webm                            webm;
        video/quicktime                       mov;    # ← crucial pour tes .mov
        video/ogg                             ogv;
        font/woff2                            woff2;
        font/woff                             woff;
    }

    # ── Manifest PWA ──
    location = /manifest.json {
        add_header Content-Type "application/manifest+json";
    }

    # ── Vidéos — streaming avec Range requests ──
    # Indispensable pour que les vidéos se chargent correctement sur Quest
    location /videos/ {
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Assets statiques ──
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2|woff)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── Headers généraux ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # ── API proxy → backend Node.js ──
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        client_max_body_size 20m;
    }

    # ── Photos temporaires (générées par l'API) ──
    location /photos/ {
        alias /usr/share/nginx/html/photos/;
        add_header Cache-Control "public, max-age=7200";
    }

    # ── HTML — jamais mis en cache ──
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Fallback SPA ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Logs ──
    access_log /var/log/nginx/mct_access.log;
    error_log  /var/log/nginx/mct_error.log;
}
