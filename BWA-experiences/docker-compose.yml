services:
  bwa:
    build: .
    container_name: bwa-platform
    ports:
      - "8080:80"
    volumes:
      - ./videos:/usr/share/nginx/html/videos:ro
      - photos:/usr/share/nginx/html/photos
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./api
    container_name: bwa-api
    environment:
      - IG_ACCESS_TOKEN=${IG_ACCESS_TOKEN}
      - IG_ACCOUNT_ID=${IG_ACCOUNT_ID}
      # Public URL reachable by Instagram servers to download the photo
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:8080}
    volumes:
      - photos:/photos
    restart: unless-stopped

volumes:
  photos:

# Access : http://localhost:8080
# On Quest : http://<YOUR_PC_IP>:8080
