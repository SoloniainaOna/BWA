server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    types {
        text/html                   html htm;
        text/css                    css;
        application/javascript      js;
        application/json            json;
        application/manifest+json   webmanifest json;
        image/png                   png;
        image/jpeg                  jpg jpeg;
        image/svg+xml               svg;
        image/x-icon                ico;
        font/woff2                  woff2;
        font/woff                   woff;
    }

    location = /manifest.json {
        add_header Content-Type "application/manifest+json";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2|woff)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location /api/ {
        proxy_pass http://instagram-api:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    access_log /var/log/nginx/bwa_journey_access.log;
    error_log  /var/log/nginx/bwa_journey_error.log;
}
