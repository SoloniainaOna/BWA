plugins {
    id 'com.android.application'
}

android {
    namespace 'com.bwa.journey'
    compileSdk 34

    defaultConfig {
        applicationId "com.bwa.journey"
        minSdk 22          // Fire OS 5+
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.9.0'
}
